<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management</title>
    <link rel="stylesheet" href="shift_schedule.css">

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
    <div id="sidebar"></div>
    <div class="container">
        <!-- Upcoming Shifts Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Upcoming Shifts</h2>
                <div class="week-navigation">
                    <button class="nav-btn" onclick="previousWeek()">
                        <span class="arrow-left"></span>
                        Previous Week
                    </button>
                    <span class="current-week" id="currentWeekDisplay">Current Week</span>
                    <button class="nav-btn" onclick="nextWeek()">
                        Next Week
                        <span class="arrow-right"></span>
                    </button>
                </div>
            </div>
            
            <div class="calendar-grid" id="calendarGrid">
                <!-- Calendar will be generated by JavaScript -->
            </div>
        </div>

        <!-- Shift History Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Shift History</h2>
            </div>
            
            <div class="filter-section">
                <div class="filter-control">
                    <span class="filter-label">Filter by month:</span>
                    <select class="filter-select" id="monthFilter" onchange="filterByMonth()">
                        <option value="2023-08">August 2023</option>
                        <option value="2023-07">July 2023</option>
                        <option value="2023-06">June 2023</option>
                        <option value="2023-05">May 2023</option>
                        <option value="2023-04">April 2023</option>
                    </select>
                </div>
            </div>
            
            <table class="table">
                <thead class="table-header">
                    <tr>
                        <th>DATE</th>
                        <th>SHIFT TIME</th>
                        <th>DEPARTMENT</th>
                        <th>CLOCK IN</th>
                    </tr>
                </thead>
                <tbody id="shiftHistoryTable">
                    <!-- Table content will be generated by JavaScript -->
                </tbody>
            </table>
            
            <div class="pagination">
                <div class="pagination-info" id="paginationInfo">
                    Showing 1 to 5 of 42 shifts
                </div>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="prevBtn" onclick="previousPage()">Previous</button>
                    <button class="pagination-btn active" onclick="goToPage(1)">1</button>
                    <button class="pagination-btn" onclick="goToPage(2)">2</button>
                    <button class="pagination-btn" onclick="goToPage(3)">3</button>
                    <button class="pagination-btn" id="nextBtn" onclick="nextPage()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="shift_schedule.js"></script>
    <script src="SIDEBAR.js"></script>
</body>
</html>
