<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendance Record- Employee Attendance System</title>
  <link rel="stylesheet" href="logout.css" />
  <!-- Font Awesome CDN for icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>

<body>
  <div id="sidebar"></div>
       <!-- Logout Modal -->
    <div class="modal-overlay" id="logoutModal">
        <div class="modal-content">
            <div class="logout-icon">
                <i class="fa-solid fa-right-from-bracket"></i>
            </div>
            <h2 class="modal-title">Sign Out</h2>
            <p class="modal-message">Are you sure you want to sign out of your RetailCorp <span id="modalUserType">Manager</span> account?</p>
            
            <div class="user-info-modal">
                <div class="user-avatar-modal" id="modalUserAvatar">JD</div>
                <div class="user-details-modal">
                    <div class="user-name-modal" id="modalUserName">John Doe</div>
                    <div class="user-position-modal" id="modalUserPosition">Sales & Customer Service Manager</div>
                    <div class="last-login" id="lastLogin">Last login: Jun 2, 10:48 AM</div>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="hideLogoutModal()">
                    <i class="fa-solid fa-times"></i>
                    Cancel
                </button>
                <button class="btn-signout" onclick="signOut()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sign Out
                </button>
            </div>
        </div>
    </div>

    <script src="logout.js"></script>
    <script src="SIDEBAR.js"></script>
</body>
</html>
