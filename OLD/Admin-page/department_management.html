<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Department Management- Employee Attendance System</title>
  <link rel="stylesheet" href="department_management.css" />
  <!-- Font Awesome CDN for icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>

<body>
  <div id="sidebar"></div>
  <div class="container">
        <div class="department_management-header">
            <h1>Department Management</h1>
            <button class="add-department-btn" onclick="openAddModal()">
                + Add Department
            </button>
        </div>

        <div class="departments-grid" id="departmentsGrid">
        </div>
    </div>

    <!-- Add/Edit Department Modal -->
    <div id="departmentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Department</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <form id="departmentForm">
                <div class="form-group">
                    <label for="departmentName">Department Name</label>
                    <input type="text" id="departmentName" required>
                </div>
                <div class="form-group">
                    <label for="departmentDescription">Description</label>
                    <textarea id="departmentDescription" placeholder="Describe the department's responsibilities..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="departmentManager">Manager</label>
                    <select id="departmentManager">
                        <option value="">No Manager Assigned</option>
                        <option value="John Doe">John Doe</option>
                        <option value="Sarah Davis">Sarah Davis</option>
                        <option value="Lisa Anderson">Lisa Anderson</option>
                        <option value="Michael Johnson">Michael Johnson</option>
                        <option value="Emily Chen">Emily Chen</option>
                        <option value="Robert Wilson">Robert Wilson</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="shiftRequired">
                        <label for="shiftRequired">Requires Shift Work</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Department</button>
                </div>
            </form>
        </div>
    </div>

    <script src="department_management.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
