<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetailCorp Employee Attendance System</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
    <div class="header">
        <div class="left-header">
            <h1>Retail Corp</h1>
            <p>Employee Attendance System</p>
        </div>
        <div class="right-header">
            <div class="date" id="date"></div>
            <div class="time" id="time"></div>
        </div>
    </div>

    <label>
        <input type="checkbox" />
        <div class="toggle">
            <span class="top_line common"></span>
            <span class="middle_line common"></span>
            <span class="bottom_line common"></span>
        </div>

        <div class="slide">
            <h1>Retail Corp</h1>
            <p>Employee Attendance System</p>

                            <!-- User Profile Section -->
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">JD</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">John Doe</div>
                        <div class="user-position admin" id="userPosition">Admin</div>
                    </div>
                </div>

            <ul>
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-bar"></i>Dashboard</a></li>
                <li><a href="employee_management.html"><i class="fa-solid fa-users"></i>Employee Management</a></li>
                <li><a href="department_management.html"><i class="fa-solid fa-building"></i>Department Management</a></li>
                <li><a href="attendance_record.html"><i class="fa-solid fa-calendar-days"></i>Attendance Record</a></li>
                <li><a href="logout.html"><i class="fa-solid fa-right-from-bracket"></i>Logout</a></li>
            </ul>
        </div>
    </label>
    <script src="sidebar.js"></script>
</body>
</html>
