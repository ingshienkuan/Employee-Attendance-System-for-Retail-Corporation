<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Employee Attendance System</title>
  <link rel="stylesheet" href="dashboard.css" />
  <!-- Font Awesome CDN for icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
    

  <div id="sidebar"></div>
    <div class="container">
        <!-- Header -->
        <div class="dashboard-header">
            <h1>Admin Dashboard Overview</h1>
        </div>

  <div class="dashboard-grid">

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Total Employees</div>
          <div class="card-value">124</div>
        </div>
        <div class="card-icon icon-blue">
          <i class="fa-regular fa-id-badge"></i>
        </div>
      </div>
      <div class="card-footer">
        <div class="metric-row">
          <span class="metric-label">Active today</span>
          <span class="metric-value">
            <span class="trend-up"></span>
            92%
          </span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Present Today</div>
          <div class="card-value">114</div>
        </div>
        <div class="card-icon icon-green">
          <i class="fa-regular fa-calendar-check"></i>
        </div>
      </div>
      <div class="card-footer">
        <div class="progress-bar">
          <div class="progress-fill progress-green" style="width: 92%"></div>
        </div>
        <div style="text-align: right; margin-top: 8px;">
          <span class="percentage-text">92%</span>
        </div>
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-header">
        <h2 class="chart-title">Attendance by Department</h2>
        <div class="time-filter">
          <div id="real-time-date" class="date"></div>
        </div>
      </div>

      <div class="chart-area">
        <div id="chartContent">
          <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            Loading...
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Absent Today</div>
          <div class="card-value">5</div>
        </div>
        <div class="card-icon icon-red">
          <i class="fa-regular fa-calendar-xmark"></i>
        </div>
      </div>
      <div class="card-footer">
        <div style="display: flex; align-items: center; margin-bottom: 8px;">
          <span class="status-dot dot-red"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill progress-red" style="width: 4%"></div>
        </div>
        <div style="text-align: right; margin-top: 8px;">
          <span class="percentage-text">4%</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Late Arrivals</div>
          <div class="card-value">5</div>
        </div>
        <div class="card-icon icon-yellow">
          <i class="fa-regular fa-clock"></i>
        </div>
      </div>
      <div class="card-footer">
        <div style="display: flex; align-items: center; margin-bottom: 8px;">
          <span class="status-dot dot-yellow"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill progress-yellow" style="width: 4%"></div>
        </div>
        <div style="text-align: right; margin-top: 8px;">
          <span class="percentage-text">4%</span>
        </div>
      </div>
    </div>

  </div>

  <script src="dashboard.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
