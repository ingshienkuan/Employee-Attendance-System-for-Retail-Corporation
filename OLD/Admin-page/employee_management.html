<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee MManagement- Employee Attendance System</title>
  <link rel="stylesheet" href="employee_management.css" />
  <!-- Font Awesome CDN for icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>

<body>
  <div id="sidebar"></div>
      <div class="container">
        <div class="employee_management-header">
            <h1>Employee Management</h1>
            <button class="add-employee-btn" onclick="openAddModal()">
                + Add Employee
            </button>
        </div>

        <div class="filters">
            <div class="search-box">
                <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search employees..."
                    onkeyup="filterEmployees()"
                />
            </div>
            <select class="filter-select" id="departmentFilter" onchange="filterEmployees()">
                <option value="">All Departments</option>
                <option value="Sales & Customer Service">Sales & Customer Service</option>
                <option value="Inventory & Supply Chain Management">Inventory & Supply Chain Management</option>
                <option value="Marketing & Merchandising">Marketing & Merchandising</option>
                <option value="Human Resources">Human Resources</option>
                <option value="Finance & Accounting">Finance & Accounting</option>
                <option value="IT & E-Commerce">IT & E-Commerce</option>
            </select>
            <select class="filter-select" id="roleFilter" onchange="filterEmployees()">
                <option value="">All Roles</option>
                <option value="Manager">Manager</option>
                <option value="Employee">Employee</option>
                <option value="Admin">Admin</option>
            </select>
            <select class="filter-select" id="statusFilter" onchange="filterEmployees()">
                <option value="">All Status</option>
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
                <option value="On Leave">On Leave</option>
            </select>
        </div>

        <div class="employee-table">
            <table>
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Department</th>
                        <th>Role</th>
                        <th>Employment Type</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Employee</h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <form id="employeeForm">
                <div class="form-group">
                    <label for="employeeName">Full Name</label>
                    <input type="text" id="employeeName" required />
                </div>
                <div class="form-group">
                    <label for="employeeid">ID</label>
                    <input type="id" id="employeeid" required />
                </div>
                <div class="form-group">
                    <label for="employeeDepartment">Department</label>
                    <select id="employeeDepartment" required>
                        <option value="">Select Department</option>
                        <option value="Sales & Customer Service">Sales & Customer Service</option>
                        <option value="Inventory & Supply Chain Management">Inventory & Supply Chain Management</option>
                        <option value="Marketing & Merchandising">Marketing & Merchandising</option>
                        <option value="Human Resources">Human Resources</option>
                        <option value="Finance & Accounting">Finance & Accounting</option>
                        <option value="IT & E-Commerce">IT & E-Commerce</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="employeePosition">Position</label>
                    <input type="text" id="employeePosition" required />
                </div>
                <div class="form-group">
                    <label for="employeeRole">Role</label>
                    <select id="employeeRole" required>
                        <option value="">Select Role</option>
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="employmentType">Employment Type</label>
                    <select id="employmentType" required>
                        <option value="">Select Type</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Intern">Intern</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="employeeStatus">Status</label>
                    <select id="employeeStatus" required>
                        <option value="">Select Status</option>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="On Leave">On Leave</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Employee</button>
                </div>
            </form>
        </div>
    </div>

    <script src="employee_management.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
