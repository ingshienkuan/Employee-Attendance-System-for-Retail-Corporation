<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Monitoring</title>
    <link rel="stylesheet" href="attendance.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../side-bar/sidebar.css">
</head>
<body class="bg-gray-100">

    <!-- Sidebar and Header will be loaded here -->
    <div id="sidebarContainer"></div>

    <div class="main-content">
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-header">
                <h2 class="filter-title">Filter Attendance Records</h2>
                <button id="toggleFilters" class="filter-toggle">
                    <i class="fas fa-filter"></i>
                    <span id="toggleText">Hide Filters</span>
                    <i class="fas fa-chevron-up" id="toggleIcon"></i>
                </button>
            </div>
            
            <div class="filter-content" id="filterContent">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label for="filterDate">Date</label>
                        <input type="date" id="filterDate" class="filter-input" value="2025-05-23">
                    </div>
                    <div class="filter-item">
                        <label for="filterEmployee">Employee</label>
                        <input type="text" id="filterEmployee" class="filter-input" placeholder="Name or ID">
                    </div>
                    <div class="filter-item">
                        <label for="filterDepartment">Department</label>
                        <select id="filterDepartment" class="filter-input">
                            <option value="">All Departments</option>
                            <option value="Sales & Customer Service">Sales & Customer Service</option>
                            <option value="IT & E-commerce">IT & E-commerce</option>
                            <option value="Marketing & Merchandising">Marketing & Merchandising</option>
                            <option value="Inventory & Supply Chain Management">Inventory & Supply Chain Management</option>
                            <option value="HR">HR</option>
                            <option value="Finance & Accounting">Finance & Accoounting</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="filterStatus">Status</label>
                        <select id="filterStatus" class="filter-input">
                            <option value="">All Status</option>
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                            <option value="late">Late</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Attendance Logs Section -->
        <div class="logs-section">
            <div class="logs-header">
                <div class="logs-title-section">
                    <h2 class="logs-title">Attendance Logs</h2>
                    <p class="logs-subtitle">Showing <span id="recordCount">8</span> records</p>
                </div>
                <div class="filter-toggle-mobile">
                    <button id="showFiltersBtn" class="show-filters-btn">
                        <i class="fas fa-filter"></i>
                        <span>Show Filters</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                </div>
            </div>

            <!-- Attendance Table -->
            <div class="table-container">
                <table id="attendanceTable" class="attendance-table">
                    <thead>
                        <tr>
                            <th>EMPLOYEE</th>
                            <th>DEPARTMENT</th>
                            <th>DATE</th>
                            <th>CLOCK IN</th>
                            <th>CLOCK OUT</th>
                            <th>HOURS</th>
                            <th>OVERTIME</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceLogs">
                        <!-- Data rows will be inserted here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Linking Sidebar JS -->
    <script src="../side-bar/sidebar.js"></script>
    <script src="attendance.js"></script>

    <script>
        // Load sidebar HTML dynamically
        fetch('../side-bar/sidebar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('sidebarContainer').innerHTML = data;
            })
            .catch(error => console.log('Error loading sidebar:', error));
    </script>

</body>
</html>
