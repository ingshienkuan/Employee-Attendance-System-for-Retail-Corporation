<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailCorp Employee Attendance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="header">
        <div class="left-header">
            <h1>Retail Corp</h1>
            <p>Manager Attendance System</p>
        </div>
        <div class="right-header">
            <div class="date" id="date"></div>
            <div class="time" id="time"></div>
        </div>
    </div>

    <label>
        <input type="checkbox" id="sidebar-toggle">
        <div class="toggle">
            <span class="top_line common"></span>
            <span class="middle_line common"></span>
            <span class="bottom_line common"></span>
        </div>

        <div class="slide">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-building"></i>
                    <span class="logo-text">RetailHQ Manager</span>
                </div>
            </div>

            <div class="profile">
                <div class="profile-img-container">
                    <div class="profile-initials">JD</div>
                </div>
                <div class="profile-text">
                    <p class="username">John Doe</p>
                    <p class="department">Sales & Customer Service</p>
                </div>
            </div>

            <ul class="sidebar-menu">
                <li><a href="../Main-page/dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i><span class="menu-text">Dashboard</span></a></li>
                <li><a href="../Attendance-page/attendance.html"><i class="fas fa-users"></i><span class="menu-text">Attendance Monitoring</span></a></li>
                <li>
                    <a href="../LeaveRequest-page/request.html">
                        <i class="fas fa-calendar-check"></i>
                        <span class="menu-text">Request & Approval</span>
                        <span class="badge">3</span>
                    </a>
                </li>
                <li><a href="../shift-page/shift.html"><i class="fas fa-clock"></i><span class="menu-text">Shift Management</span></a></li>
                <li><a href="../logout-page/logout.html"><i class="fas fa-sign-out-alt"></i><span class="menu-text">Logout</span></a></li>
            </ul>
        </div>
    </label>

    <script src="sidebar.js"></script>
</body>
</html>
