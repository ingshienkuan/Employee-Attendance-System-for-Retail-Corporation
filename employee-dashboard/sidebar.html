<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailCorp Employee Attendance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="header">
        <div class="left-header">
            <h1>Retail Corp</h1>
            <p>Employee Attendance System</p>
        </div>
        <div class="right-header">
            <div class="date" id="date"></div>
            <div class="time" id="time"></div>
        </div>
        
    </div>
    <label>
        <input type="checkbox">
        <div class="toggle">
            <span class="top_line common"></span>
            <span class="middle_line common"></span>
            <span class="bottom_line common"></span>
        </div>

        <div class="slide">
        <h1>Retail Corp</h1>
        <p>Employee Attendance System</p>
        <ul>
            <li><a href="#"><i class="fas fa-tv"></i> dashboard</a></li>
            <li><a href="#"><i class="far fa-clock"></i> clock in/out</a></li>
            <li><a href="#"><i class="far fa-address-book"></i> attendance history</a></li>
            <li><a href="#"><i class="far fa-envelope"></i> leave management</a></li>
            <li><a href="#"><i class="far fa-user"></i> profile</a></li>
        </ul>
    </label>
    <script src="sidebar.js"></script>
</body>
</html>
